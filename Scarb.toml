[package]
name = "starknet_payments"
version = "0.1.0"
edition = "2024_07"

[dependencies]
starknet = "2.12.0"
openzeppelin = "2.0.0"
starkware_utils = { git ="https://github.com/starkware-libs/starkware-starknet-utils", rev="42adb5044b83e447e4eb60e9f0453252716ca16f" }

[dev-dependencies]
snforge_std = "0.45.0"
assert_macros = "2.12.0"
openzeppelin_testing = "4.2.0"
starkware_utils_testing = { git="https://github.com/starkware-libs/starkware-starknet-utils", rev="42adb5044b83e447e4eb60e9f0453252716ca16f" }

[[target.starknet-contract]]
sierra = true

[scripts]
test = "SNFORGE_BACKTRACE=1 snforge test"

[tool.fmt]
sort-module-level-items = true

[tool.scarb]
allow-prebuilt-plugins = ["snforge_std"]

[profile.dev.cairo]
unstable-add-statements-code-locations-debug-info = true
unstable-add-statements-functions-debug-info = true
panic-backtrace = true
inlining-strategy = "avoid"
