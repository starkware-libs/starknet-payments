name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  cairo_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: foundry-rs/setup-snfoundry@bd5fc266ba0ce7e352b01dd7eaacc0fbb6145d17 # v3
        with:
          starknet-foundry-version: "0.45.0"

      - uses: software-mansion/setup-scarb@2a96b748888e3329ee44ac9ac073d930e692b3cd # v1
        with:
          scarb-version: "2.11.4"

      - name: Install cairo-coverage
        run: |
          curl -L https://raw.githubusercontent.com/software-mansion/cairo-coverage/main/scripts/install.sh | sh

      - name: Run test and coverage
        run: scarb test -w --coverage

      # - uses: codecov/codecov-action@v5
      #   with:
      #     fail_ci_if_error: true

      - name: Check formatting
        run: scarb fmt -w --check

      - name: Build Contracts
        run: scarb build
